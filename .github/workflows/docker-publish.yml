name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'            # trigger juga saat push tag versi (v1.0.0, v1.2.3, dst.)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # aefw/hapm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # diperlukan untuk push ke ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # diperlukan agar git describe --tags bisa berjalan

      - name: Set up QEMU
        # QEMU dibutuhkan untuk emulasi arm64 di runner amd64
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Push tag main → :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Push tag semver → :v1.2.3 dan :1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Selalu tambahkan commit SHA pendek
            type=sha,prefix=sha-

      - name: Build & Push image multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layer build di GitHub Actions Cache agar lebih cepat
          cache-from: type=gha
          cache-to: type=gha,mode=max
